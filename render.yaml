# Deploy on https://render.com — New Blueprint → connect this repo, or create Web Service manually.
services:
  - type: web
    name: wifi-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: HOTSPOT_ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
