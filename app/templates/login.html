{% extends "base.html" %}
{% block title %}Staff login{% endblock %}
{% block body %}
<div class="login-box card easy-card">
  <h1 class="hero-title">Staff login</h1>
  <p class="lead">Enter the password for this PC. Default is <code>changeme</code> until you change it.</p>
  {% if error %}
  <p class="err">{{ error }}</p>
  {% endif %}
  <form method="post" action="/login" class="stack">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required autocomplete="current-password" class="big-input" />
    <button type="submit" class="btn-huge">Continue</button>
  </form>
</div>
{% endblock %}
